services:
  emptyarr:
    build: .
    container_name: emptyarr
    restart: unless-stopped
    ports:
      - "8222:8222"
    volumes:
      # ── Config file ─────────────────────────────────────────────────────────
      # Create this file BEFORE starting the container.
      # Use the setup wizard at http://localhost:8222 to generate it,
      # or copy data/config.yml.example and edit manually.
      - ./data/config.yml:/app/data/config.yml:ro

      # ── Media root mounts ────────────────────────────────────────────────────
      # Mount the ROOT of each media area — not individual subfolders.
      # The wizard will let you browse and select the specific paths inside.
      # Paths used in config.yml must be reachable from inside the container.

      # All symlink media (debrid, usenet symlinks):
      - /mnt/symlink_media:/mnt/symlink_media:ro

      # Physical media:
      - /mnt/user/media:/mnt/user/media:ro

    environment:
      # ── Plex tokens ──────────────────────────────────────────────────────────
      # One variable per Plex instance, named after the instance name:
      # uppercased, spaces/hyphens → underscores, prefixed with PLEX_TOKEN_
      # Example: instance "My Plex" → PLEX_TOKEN_MY_PLEX
      # Uncomment and rename to match your instance names:
      # - PLEX_TOKEN_MY_INSTANCE=${PLEX_TOKEN_MY_INSTANCE:-}

      # ── Debrid provider API keys (optional) ──────────────────────────────────
      - RD_API_KEY=${RD_API_KEY:-}
      - AD_API_KEY=${AD_API_KEY:-}
      - TB_API_KEY=${TB_API_KEY:-}
      - DL_API_KEY=${DL_API_KEY:-}

      # ── Web UI auth (optional but recommended) ───────────────────────────────
      # If set, the web UI will require a username and password.
      # Leave blank to disable auth (fine for local-only access).
      - EMPTYARR_USERNAME=${EMPTYARR_USERNAME:-}
      - EMPTYARR_PASSWORD=${EMPTYARR_PASSWORD:-}

      # ── Notifications ─────────────────────────────────────────────────────────
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK:-}

      # ── Other ─────────────────────────────────────────────────────────────────
      - PUID=99
      - PGID=100
      - TZ=America/New_York
      - LOG_LEVEL=INFO